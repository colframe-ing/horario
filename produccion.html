<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#071D49">
  <title>COLFRAME — Producción</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .proy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .proy-card {
      background: #fff;
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: transform var(--transition), box-shadow var(--transition);
      border-left: 4px solid var(--cf-blue);
      outline: none;
    }
    .proy-card:hover, .proy-card:focus { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .proy-card.cerrado { border-left-color: var(--cf-gray-text); opacity: 0.75; }
    .proy-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 4px; }
    .proy-nombre { font-weight: 700; font-size: 0.9rem; color: var(--cf-dark); line-height: 1.3; flex: 1; }
    .estado-badge { font-size: 0.67rem; font-weight: 700; padding: 2px 8px; border-radius: 999px; white-space: nowrap; flex-shrink: 0; }
    .estado-badge.ACTIVO  { background: #D1FAE5; color: #065F46; }
    .estado-badge.CERRADO { background: #F1F5F9; color: #64748B; }
    .proy-fecha { font-size: 0.78rem; color: var(--cf-gray-text); margin-bottom: 8px; }
    .proy-capas { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; min-height: 24px; }
    .proy-footer { display: flex; align-items: center; justify-content: space-between; font-size: 0.78rem; color: var(--cf-gray-text); }
    .proy-metros-total { font-weight: 700; color: var(--cf-dark); }

    .mod-nav { background: #fff; border-bottom: 1px solid var(--cf-gray-mid); padding: 0 16px; display: flex; gap: 4px; overflow-x: auto; }
    .mod-nav-link { padding: 10px 14px; font-size: 0.82rem; font-weight: 700; color: var(--cf-gray-text); text-decoration: none; border-bottom: 3px solid transparent; white-space: nowrap; display: inline-block; }
    .mod-nav-link.active { color: var(--cf-blue); border-bottom-color: var(--cf-blue); }
    .mod-nav-link:hover:not(.active) { color: var(--cf-dark); }

    .detalle-header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
    .detalle-header h2 { flex: 1; min-width: 160px; font-size: 0.95rem; line-height: 1.4; }
    .anomalia-banner { background: #FFFBEB; border: 1px solid #FDE68A; border-radius: 8px; padding: 10px 14px; font-size: 0.82rem; color: #92400E; margin-bottom: 12px; line-height: 1.4; }
    .detalle-capas { display: flex; flex-wrap: wrap; gap: 8px; padding: 14px 20px; }
    .detalle-total { font-weight: 800; font-size: 0.95rem; color: var(--cf-dark); white-space: nowrap; }
    .detalle-section { padding: 0 20px 16px; }
    .detalle-section-title { font-size: 0.72rem; font-weight: 700; color: var(--cf-gray-text); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; padding: 14px 0 6px; border-bottom: 1px solid var(--cf-gray-mid); }
    .arch-list { display: flex; flex-direction: column; gap: 4px; }
    .arch-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 7px 10px; background: var(--cf-gray); border-radius: 6px; font-size: 0.8rem; }
    .arch-info { display: flex; align-items: center; gap: 6px; min-width: 0; flex: 1; }
    .arch-nombre { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--cf-dark); font-size: 0.78rem; }
    .arch-meta { color: var(--cf-gray-text); font-size: 0.75rem; white-space: nowrap; flex-shrink: 0; display: flex; align-items: center; gap: 4px; }
    .arch-perfil { font-size: 0.7rem; font-weight: 700; padding: 1px 6px; border-radius: 4px; background: #EFF6FF; color: var(--cf-blue); }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <img src="assets/logo-horizontal-blanco.svg"
         onerror="this.outerHTML='<span style=\'color:#fff;font-weight:800;font-size:1.1rem\'><span>COL</span><span style=\'color:#0072CE\'>FRAME</span></span>'"
         alt="COLFRAME" class="header-logo">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="color:rgba(255,255,255,0.65);font-size:0.78rem;font-weight:600;letter-spacing:0.05em;">PRODUCCIÓN</span>
      <button id="logoutBtn" class="btn-icon" title="Cerrar sesión" aria-label="Cerrar sesión">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Nav módulos (solo visible para admins — JS remueve hidden) -->
  <nav id="modNav" class="mod-nav hidden">
    <a href="admin.html"        class="mod-nav-link">Asistencia</a>
    <a href="produccion.html"   class="mod-nav-link active">Producción</a>
    <a href="cotizaciones.html" class="mod-nav-link">Cotizaciones</a>
    <a href="programacion.html" class="mod-nav-link">Programación</a>
  </nav>

  <!-- ══ VISTA LISTA ══════════════════════════════════════════ -->
  <div id="vistaLista" class="admin-main admin-panel">

    <!-- Barra de acciones admin -->
    <div id="adminBar" class="hidden" style="display:flex;justify-content:flex-end;margin-bottom:12px;">
      <button id="btnScanNow" class="btn btn-ghost btn-sm">🔄 Escanear Drive</button>
    </div>

    <!-- Anomalías del escaneo (solo admin; oculto si no hay ninguna) -->
    <div class="table-card" id="anomaliasCard" style="margin-bottom:14px;display:none;">
      <div class="table-header">
        <h3>⚠ Anomalías del escaneo (<span id="anomaliasCount">0</span>)</h3>
        <button id="btnAnomaliasRefrescar" class="btn btn-ghost btn-sm">🔄 Revisar</button>
      </div>
      <div id="anomaliasBody" style="padding:14px 20px;display:flex;flex-direction:column;gap:6px;"></div>
    </div>

    <!-- Filtros -->
    <div class="filter-bar">
      <div class="filter-group">
        <label>Año</label>
        <select id="filtroAnio" style="min-width:100px;">
          <option value="">Todos</option>
          <option value="2026" selected>2026</option>
          <option value="2025">2025</option>
          <option value="2024">2024</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Mes</label>
        <select id="filtroMes" style="min-width:130px;">
          <option value="">Todos</option>
          <option value="1">Enero</option>
          <option value="2">Febrero</option>
          <option value="3">Marzo</option>
          <option value="4">Abril</option>
          <option value="5">Mayo</option>
          <option value="6">Junio</option>
          <option value="7">Julio</option>
          <option value="8">Agosto</option>
          <option value="9">Septiembre</option>
          <option value="10">Octubre</option>
          <option value="11">Noviembre</option>
          <option value="12">Diciembre</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Estado</label>
        <select id="filtroEstado" style="min-width:110px;">
          <option value="">Todos</option>
          <option value="ACTIVO" selected>Activos</option>
          <option value="CERRADO">Cerrados</option>
        </select>
      </div>
      <button id="btnBuscar" class="btn btn-dark btn-sm">Buscar</button>
    </div>

    <!-- Resumen -->
    <div class="summary-cards">
      <div class="summary-card">
        <div class="label">Proyectos</div>
        <div class="value" id="sumProyectos">—</div>
      </div>
      <div class="summary-card" style="border-left-color:var(--cf-success);">
        <div class="label">Metros lineales EP2</div>
        <div class="value" id="sumMetros">—</div>
      </div>
    </div>

    <!-- Cuadrícula de proyectos -->
    <div id="bodyProyectos" class="proy-grid">
      <div style="text-align:center;padding:56px 24px;grid-column:1/-1;color:var(--cf-gray-text);">
        <span class="spinner" style="border-color:rgba(0,0,0,0.1);border-top-color:var(--cf-blue);"></span>
      </div>
    </div>

  </div>

  <!-- ══ VISTA DETALLE ════════════════════════════════════════ -->
  <div id="vistaDetalle" class="admin-main admin-panel hidden">

    <div class="detalle-header">
      <button id="btnVolverLista" class="btn btn-ghost btn-sm">← Volver</button>
      <h2 id="detalleNombre"></h2>
      <a id="btnDrive" href="#" target="_blank" rel="noopener noreferrer" class="btn btn-ghost btn-sm" style="font-size:0.8rem;">📂 Drive</a>
      <button id="btnEstado" class="btn btn-ghost btn-sm hidden" style="font-size:0.8rem;"></button>
    </div>

    <div id="detalleAnomalia" class="anomalia-banner hidden"></div>

    <!-- Resumen capas -->
    <div class="table-card" style="margin-bottom:14px;">
      <div class="table-header">
        <h3>Metros por capa</h3>
        <span id="detalleTotalMetros" class="detalle-total">—</span>
      </div>
      <div id="detalleCapas" class="detalle-capas"></div>
    </div>

    <!-- Lista de archivos -->
    <div class="table-card">
      <div id="detalleBody">
        <div style="text-align:center;padding:40px;">
          <span class="spinner" style="border-color:rgba(0,0,0,0.1);border-top-color:var(--cf-blue);"></span>
        </div>
      </div>
    </div>

  </div>

  <!-- Modal confirmación -->
  <div id="modalConfirmProd" class="modal-overlay hidden">
    <div class="modal" style="max-width:360px;">
      <div class="modal-header">
        <h2 id="confirmProdTitle">Confirmar</h2>
      </div>
      <p id="confirmProdMsg" style="font-size:0.9rem;line-height:1.5;color:var(--cf-dark);margin:0;"></p>
      <div class="modal-actions">
        <button id="confirmProdCancel" class="btn btn-ghost btn-sm">Cancelar</button>
        <button id="confirmProdOk"     class="btn btn-dark  btn-sm">Confirmar</button>
      </div>
    </div>
  </div>

  <!-- Toasts -->
  <div id="toastContainer" style="position:fixed;top:80px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/produccion.js"></script>
</body>
</html>
