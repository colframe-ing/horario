<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#071D49">
  <title>COLFRAME — Cotizaciones</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .cot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; }
    .cot-card {
      background: #fff; border-radius: var(--radius); padding: 14px 16px;
      box-shadow: var(--shadow); border-left: 4px solid var(--cf-gray-mid);
      display: flex; flex-direction: column; gap: 8px;
    }
    .cot-card.aprobada { border-left-color: var(--cf-success); }
    .cot-card.con-error { border-left-color: #DC2626; }
    .cot-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .cot-proyecto { font-weight: 700; font-size: 0.9rem; color: var(--cf-dark); line-height: 1.3; flex: 1; }
    .cot-cons { font-size: 0.72rem; color: var(--cf-gray-text); font-weight: 700; white-space: nowrap; }
    .cot-meta { font-size: 0.75rem; color: var(--cf-gray-text); }
    .cot-capas { display: flex; flex-wrap: wrap; gap: 5px; }
    .cot-chip { font-size: 0.68rem; font-weight: 700; padding: 2px 7px; border-radius: 999px; white-space: nowrap; }
    .cot-chip.c075 { background: #FEF3C7; color: #92400E; }
    .cot-chip.c095 { background: #DBEAFE; color: #1E40AF; }
    .cot-chip.c115 { background: #E0E7FF; color: #3730A3; }
    .cot-chip.c140 { background: #F3E8FF; color: #6B21A8; }
    .cot-bottom { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-top: 2px; }
    .cot-total { font-weight: 800; font-size: 0.9rem; color: var(--cf-dark); }
    .cot-ml { font-size: 0.75rem; color: var(--cf-gray-text); }
    .cot-error-badge { font-size: 0.68rem; font-weight: 700; color: #DC2626; background: #FEE2E2; padding: 2px 7px; border-radius: 6px; }
    .cot-chequeo { font-size: 0.68rem; color: #B45309; }
    .btn-aprobar {
      font-size: 0.72rem; font-weight: 700; padding: 5px 10px; border-radius: 8px;
      border: 1.5px solid var(--cf-gray-mid); background: #fff; color: var(--cf-gray-text);
      cursor: pointer; white-space: nowrap; transition: all var(--transition);
    }
    .btn-aprobar.on { background: var(--cf-success); border-color: var(--cf-success); color: #fff; }
    .btn-aprobar:disabled { opacity: 0.5; cursor: default; }
    .estado-aprob { font-size: 0.68rem; font-weight: 700; padding: 2px 8px; border-radius: 999px; background: #D1FAE5; color: #065F46; white-space: nowrap; }

    .cot-link-badge { font-size: 0.66rem; font-weight: 700; padding: 2px 7px; border-radius: 999px; background: #EFF6FF; color: var(--cf-blue); white-space: nowrap; }

    .card-sec { background:#fff; border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; margin-bottom:14px; }
    .card-sec h3 { font-size:0.82rem; font-weight:800; color:var(--cf-dark); margin:0 0 12px; text-transform:uppercase; letter-spacing:0.04em; }
    .cmp-table { width:100%; border-collapse:collapse; font-size:0.82rem; }
    .cmp-table th, .cmp-table td { padding:7px 10px; text-align:right; border-bottom:1px solid var(--cf-gray-mid); }
    .cmp-table th:first-child, .cmp-table td:first-child { text-align:left; font-weight:700; }
    .cmp-table thead th { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--cf-gray-text); }
    .cmp-table tfoot td { font-weight:800; border-top:2px solid var(--cf-dark); border-bottom:none; }
    .cmp-dif-pos { color:#B45309; } /* falta por producir */
    .cmp-dif-ok  { color:#065F46; } /* completo o de más */
    .fld-row { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:9px 12px; background:var(--cf-gray); border-radius:8px; margin-bottom:6px; }
    .fld-info { min-width:0; flex:1; }
    .fld-nombre { font-weight:700; font-size:0.82rem; color:var(--cf-dark); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .fld-meta { font-size:0.72rem; color:var(--cf-gray-text); }
    .fld-btn { font-size:0.72rem; font-weight:700; padding:5px 11px; border-radius:8px; border:1.5px solid var(--cf-gray-mid); background:#fff; cursor:pointer; white-space:nowrap; }
    .fld-btn.link { border-color:var(--cf-blue); color:var(--cf-blue); }
    .fld-btn.unlink { border-color:#DC2626; color:#DC2626; }
    .fld-btn:disabled { opacity:0.5; cursor:default; }

    .mod-nav { background: #fff; border-bottom: 1px solid var(--cf-gray-mid); padding: 0 16px; display: flex; gap: 4px; overflow-x: auto; }
    .mod-nav-link { padding: 10px 14px; font-size: 0.82rem; font-weight: 700; color: var(--cf-gray-text); text-decoration: none; border-bottom: 3px solid transparent; white-space: nowrap; display: inline-block; }
    .mod-nav-link.active { color: var(--cf-blue); border-bottom-color: var(--cf-blue); }
    .mod-nav-link:hover:not(.active) { color: var(--cf-dark); }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <img src="assets/logo-horizontal-blanco.svg"
         onerror="this.outerHTML='<span style=\'color:#fff;font-weight:800;font-size:1.1rem\'><span>COL</span><span style=\'color:#0072CE\'>FRAME</span></span>'"
         alt="COLFRAME" class="header-logo">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="color:rgba(255,255,255,0.65);font-size:0.78rem;font-weight:600;letter-spacing:0.05em;">COTIZACIONES</span>
      <button id="logoutBtn" class="btn-icon" title="Cerrar sesión" aria-label="Cerrar sesión">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Nav módulos (solo admins — JS remueve hidden) -->
  <nav id="modNav" class="mod-nav hidden">
    <a href="admin.html"        class="mod-nav-link">Asistencia</a>
    <a href="produccion.html"   class="mod-nav-link">Producción</a>
    <a href="cotizaciones.html" class="mod-nav-link active">Cotizaciones</a>
    <a href="programacion.html" class="mod-nav-link">Programación</a>
  </nav>

  <div id="vistaLista" class="admin-main admin-panel">

    <!-- Filtros -->
    <div class="filter-bar">
      <div class="filter-group">
        <label>Año</label>
        <select id="filtroAnio" style="min-width:100px;">
          <option value="">Todos</option>
        </select>
      </div>
      <div class="filter-group">
        <label>Mes</label>
        <select id="filtroMes" style="min-width:130px;">
          <option value="">Todos</option>
          <option value="1">Enero</option>
          <option value="2">Febrero</option>
          <option value="3">Marzo</option>
          <option value="4">Abril</option>
          <option value="5">Mayo</option>
          <option value="6">Junio</option>
          <option value="7">Julio</option>
          <option value="8">Agosto</option>
          <option value="9">Septiembre</option>
          <option value="10">Octubre</option>
          <option value="11">Noviembre</option>
          <option value="12">Diciembre</option>
        </select>
      </div>
      <div class="filter-group" style="flex:1;min-width:160px;">
        <label>Buscar</label>
        <input id="filtroBuscar" type="text" placeholder="Proyecto, consecutivo, cliente…" style="width:100%;">
      </div>
      <div class="filter-group">
        <label>Estado</label>
        <select id="filtroAprobadas" style="min-width:140px;">
          <option value="">Todas</option>
          <option value="si">Solo aprobadas</option>
        </select>
      </div>
      <button id="btnBuscar" class="btn btn-dark btn-sm">Buscar</button>
    </div>

    <!-- Resumen -->
    <div class="summary-cards">
      <div class="summary-card">
        <div class="label">Cotizaciones</div>
        <div class="value" id="sumTotal">—</div>
      </div>
      <div class="summary-card" style="border-left-color:var(--cf-success);">
        <div class="label">Aprobadas</div>
        <div class="value" id="sumAprobadas">—</div>
      </div>
      <div class="summary-card" style="border-left-color:var(--cf-blue);">
        <div class="label">ML aprobado</div>
        <div class="value" id="sumMl">—</div>
      </div>
      <div class="summary-card" style="border-left-color:#071D49;">
        <div class="label">Valor aprobado</div>
        <div class="value" id="sumValor" style="font-size:1.05rem;">—</div>
      </div>
    </div>

    <!-- Lista -->
    <div id="bodyCotiz" class="cot-grid">
      <div style="text-align:center;padding:56px 24px;grid-column:1/-1;color:var(--cf-gray-text);">
        <span class="spinner" style="border-color:rgba(0,0,0,0.1);border-top-color:var(--cf-blue);"></span>
      </div>
    </div>

  </div>

  <!-- ══ VISTA DETALLE ═══════════════════════════════════════════ -->
  <div id="vistaDetalle" class="admin-main admin-panel hidden">
    <div class="detalle-header" style="display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
      <button id="btnVolverCotiz" class="btn btn-ghost btn-sm">← Volver</button>
      <h2 id="detNombre" style="flex:1;min-width:160px;font-size:0.95rem;line-height:1.4;"></h2>
    </div>

    <div id="detBody">
      <div style="text-align:center;padding:40px;">
        <span class="spinner" style="border-color:rgba(0,0,0,0.1);border-top-color:var(--cf-blue);"></span>
      </div>
    </div>
  </div>

  <!-- Toasts -->
  <div id="toastContainer" style="position:fixed;top:80px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none;"></div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/cotizaciones.js"></script>
</body>
</html>
