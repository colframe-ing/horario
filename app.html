<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#071D49">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>COLFRAME — Horas Extra</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- Header -->
  <header class="app-header">
    <img src="assets/logo-horizontal-blanco.svg"
         onerror="this.outerHTML='<span style=\'color:#fff;font-weight:800;font-size:1.1rem;letter-spacing:0.04em\'><span style=\'color:#fff\'>COL</span><span style=\'color:#0072CE\'>FRAME</span></span>'"
         alt="COLFRAME" class="header-logo">
    <button id="logoutBtn" class="btn-icon" title="Cerrar sesión" aria-label="Cerrar sesión">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
    </button>
  </header>

  <!-- Main -->
  <main class="app-main">

    <!-- User card -->
    <div class="user-card">
      <div class="user-avatar" id="userAvatar">?</div>
      <div>
        <div class="user-name"  id="userName">Cargando...</div>
        <div class="user-cargo" id="userCargo"></div>
      </div>
    </div>

    <!-- Mark card -->
    <div class="mark-card">
      <div class="mark-status-label" id="markStatusLabel">Estado actual</div>
      <div class="mark-time" id="markClock">--:--</div>
      <div class="mark-date" id="markDate"></div>

      <button id="markBtn" class="btn btn-mark btn-primary btn-full" disabled>
        <span class="spinner hidden" id="markSpinner"></span>
        <span id="markBtnText">Cargando...</span>
      </button>

      <div class="geo-status" id="geoStatus"></div>

      <div class="last-mark hidden" id="lastMark"></div>

      <div id="markAlert" class="alert hidden"></div>
    </div>

    <!-- History -->
    <div>
      <h2 class="section-title">Últimos registros</h2>
      <div class="history-card" id="historialContainer">
        <div class="empty-state"><p>Cargando historial...</p></div>
      </div>
    </div>

  </main>

  <!-- ── Modal confirmación ── -->
  <div id="appModalConfirm" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:9000;align-items:center;justify-content:center;padding:16px;">
    <div style="background:#fff;border-radius:16px;padding:24px;max-width:340px;width:100%;box-shadow:0 8px 32px rgba(0,0,0,0.18);">
      <h2 id="appConfirmTitle" style="font-size:1rem;font-weight:800;color:#071D49;margin:0 0 10px;"></h2>
      <p  id="appConfirmMsg"   style="font-size:0.9rem;line-height:1.5;color:#374151;margin:0 0 20px;"></p>
      <div style="display:flex;justify-content:flex-end;gap:8px;">
        <button id="appConfirmCancel" style="padding:8px 16px;border-radius:8px;border:1px solid #E2E8F0;background:#fff;font-weight:600;font-size:0.85rem;cursor:pointer;">Cancelar</button>
        <button id="appConfirmOk"     style="padding:8px 16px;border-radius:8px;border:none;background:#071D49;color:#fff;font-weight:700;font-size:0.85rem;cursor:pointer;">Confirmar</button>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/geo.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
